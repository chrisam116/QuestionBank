<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST Spark ✨ | Pro Edition V3</title>
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://www.desmos.com/api/v1.8/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap');
        
        :root {
            --primary-teal: #0f172a; --active-teal: #3b82f6; --light-bg: #f1f5f9;
            --card-bg: #ffffff; --text-color: #1e293b; --subtle-text: #64748b;
            --border-color: #e2e8f0; --highlight-yellow: rgba(250, 218, 94, 0.4);
            --correct-green-bg: #f0fdf4; --correct-green-border: #22c55e; --correct-green-text: #15803d;
            --incorrect-red-bg: #fef2f2; --incorrect-red-border: #ef4444; --incorrect-red-text: #b91c1c;
            --remember-yellow: #f59e0b; --remember-yellow-dark: #d97706;
            --edited-purple-dot: #8b5cf6;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--light-bg); 
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-color); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 2rem; 
        }

        .container { 
            width: 100%; max-width: 1300px; 
            background: var(--card-bg); 
            border-radius: 16px; 
            box-shadow: var(--shadow-lg); 
            overflow: hidden; display: flex; flex-direction: column; 
            position: relative;
        }

        .header { 
            background: linear-gradient(135deg, var(--primary-teal), #1e293b); 
            color: white; padding: 1.5rem 2.5rem; 
            display: flex; justify-content: space-between; align-items: center;
        }

        .header h1 { font-family: 'Poppins', sans-serif; font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }

        main { padding: 2.5rem; min-height: 60vh; }

        /* Animation Classes */
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Dynamic Layouts */
        #test-interface { transition: var(--transition); }
        #test-interface.no-passage { display: flex; flex-direction: column; max-width: 850px; margin: 0 auto; }
        #test-interface.has-passage { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 100%; align-items: start; }
        
        @media (max-width: 900px) {
            #test-interface.has-passage { grid-template-columns: 1fr; }
        }

        /* Passage Panel (Conditional) */
        .passage-panel { 
            background: #f8fafc; border: 2px solid var(--border-color); border-radius: 12px; 
            padding: 1.5rem; max-height: 65vh; overflow-y: auto; 
        }
        .passage-panel h3 { color: var(--primary-teal); margin-bottom: 1rem; font-size: 1.2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
        .passage-content { font-size: 1.05rem; line-height: 1.8; color: var(--text-color); }
        .passage-content p { margin-bottom: 1.25rem; }
        .passage-content b { background-color: var(--highlight-yellow); padding: 0 4px; border-radius: 4px; }

        /* General UI Elements */
        .panel h2 { font-size: 1.2rem; font-weight: 700; color: var(--primary-teal); }
        .question-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border-color); }
        .header-actions { display: flex; gap: 0.75rem; }
        
        .question-prompt { font-size: 1.25rem; font-weight: 600; margin-bottom: 2rem; line-height: 1.6; }
        .answer-options { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
        
        .answer-btn { 
            display: flex; align-items: center; width: 100%; padding: 1.25rem; 
            border: 2px solid var(--border-color); border-radius: 10px; 
            background-color: var(--card-bg); font-size: 1rem; font-family: 'Inter', sans-serif; 
            font-weight: 500; text-align: left; cursor: pointer; transition: var(--transition); 
        }
        
        .answer-btn:not(:disabled):hover { border-color: var(--active-teal); background-color: #f0f6ff; transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        .answer-prefix { font-weight: 700; margin-right: 1.25rem; color: white; background: var(--primary-teal); padding: 0.2rem 0.6rem; border-radius: 6px; }
        
        .answer-btn.correct { border-color: var(--correct-green-border); background-color: var(--correct-green-bg); color: var(--correct-green-text); }
        .answer-btn.incorrect { border-color: var(--incorrect-red-border); background-color: var(--incorrect-red-bg); color: var(--incorrect-red-text); }

        /* Buttons */
        .nav-btn { background-color: var(--active-teal); color: white; border: none; padding: 0.85rem 1.75rem; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 0.5rem;}
        .nav-btn:hover:not(:disabled) { background-color: #2563eb; transform: translateY(-1px); box-shadow: var(--shadow-sm); }
        .nav-btn:disabled { background-color: #cbd5e1; color: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        .action-btn { background-color: #64748b; }
        .action-btn:hover:not(:disabled) { background-color: #475569; }
        #remember-btn { background-color: var(--remember-yellow); color: #fff; }
        #remember-btn:hover:not(:disabled) { background-color: var(--remember-yellow-dark); }
        
        /* Grid-in / Self Grade specific */
        .reveal-btn { width: 100%; justify-content: center; padding: 1.5rem; font-size: 1.1rem; background-color: var(--primary-teal); }
        .reveal-btn:hover { background-color: #334155; }
        .highlight-answer { display: inline-block; background-color: var(--correct-green-bg); color: var(--correct-green-text); border: 2px dashed var(--correct-green-border); padding: 0.5rem 1rem; border-radius: 8px; font-weight: 700; font-size: 1.2rem; margin-left: 0.5rem; }
        .self-grade-result { text-align: center; font-size: 1.1rem; font-weight: 600; padding: 1.5rem; border-radius: 10px; margin-top: 1rem; border: 2px solid; }
        .self-grade-result.correct { background-color: var(--correct-green-bg); border-color: var(--correct-green-border); color: var(--correct-green-text); }
        .self-grade-result.incorrect { background-color: var(--incorrect-red-bg); border-color: var(--incorrect-red-border); color: var(--incorrect-red-text); }
        
        /* Explanation Box */
        #explanation { margin-top: 2rem; padding: 1.5rem; background-color: #f8fafc; border-left: 5px solid var(--active-teal); border-radius: 0 8px 8px 0; animation: fadeIn 0.4s ease; }
        #explanation h4 { font-weight: 700; color: var(--primary-teal); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem;}
        #explanation p { font-size: 1rem; line-height: 1.7; }

        /* Footer & Navigation */
        .navigation-footer { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2.5rem; border-top: 1px solid var(--border-color); background-color: #f8fafc; }
        #progress-dots-container { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; max-width: 50%; }
        .progress-dot { width: 12px; height: 12px; background-color: #cbd5e1; border-radius: 50%; transition: var(--transition); cursor: pointer; }
        .progress-dot:hover { transform: scale(1.3); }
        .progress-dot.current { box-shadow: 0 0 0 3px white, 0 0 0 6px var(--active-teal); background-color: var(--active-teal); transform: scale(1.1); }
        .progress-dot.answered.correct { background-color: var(--correct-green-border); }
        .progress-dot.answered.incorrect { background-color: var(--incorrect-red-border); }
        .progress-dot.answered.edited { background-color: var(--edited-purple-dot); }

        /* Lesson Cards */
        #lesson-choice-area h2 { font-family: 'Poppins', sans-serif; font-size: 2.5rem; color: var(--primary-teal); margin-bottom: 2rem; text-align: center; }
        #lesson-cards-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        .lesson-card { background: white; border: 1px solid var(--border-color); border-radius: 12px; padding: 2rem; text-align: left; display: flex; flex-direction: column; transition: var(--transition); cursor: pointer; position: relative; overflow: hidden; }
        .lesson-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--active-teal); transform: scaleY(0); transition: var(--transition); transform-origin: bottom; }
        .lesson-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: transparent; }
        .lesson-card:hover::before { transform: scaleY(1); }
        .lesson-card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
        .lesson-card-icon { width: 48px; height: 48px; background-color: var(--primary-teal); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .lesson-card-title { font-size: 1.3rem; font-weight: 700; color: var(--primary-teal); }
        .lesson-card-description { font-size: 1rem; color: var(--subtle-text); line-height: 1.6; flex-grow: 1; }
        
        /* Desmos Floating Button & Modal */
        #desmos-fab { position: fixed; bottom: 2rem; left: 2rem; background: #1a1a1a; color: white; padding: 1rem 1.5rem; border-radius: 30px; font-weight: 600; font-family: 'Inter', sans-serif; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border: none; cursor: pointer; transition: var(--transition); z-index: 100; display: flex; align-items: center; gap: 0.5rem; font-size: 1rem; }
        #desmos-fab:hover { transform: translateY(-3px) scale(1.05); background: #333; }
        
        #desmos-modal { position: fixed; bottom: 6rem; left: 2rem; width: 600px; height: 500px; background: white; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); display: flex; flex-direction: column; overflow: hidden; z-index: 99; transition: var(--transition); transform-origin: bottom left; }
        #desmos-modal.hidden { opacity: 0; transform: scale(0.8); pointer-events: none; }
        #desmos-header { background: #1a1a1a; color: white; padding: 0.75rem 1.5rem; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        #desmos-header button { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        #desmos-header button:hover { color: #ef4444; transform: scale(1.2); }
        #calculator { flex-grow: 1; width: 100%; height: 100%; }

        /* End Screen */
        #score-screen { text-align: center; padding: 4rem 1rem; }
        #score-screen h2 { font-size: 3rem; font-family: 'Poppins'; color: var(--primary-teal); margin-bottom: 1rem; }
        #pdf-buttons-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-top: 2rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>EST Spark ✨</h1>
            <span style="font-size: 0.9rem; font-weight: 500; opacity: 0.9; background: rgba(255,255,255,0.2); padding: 0.4rem 0.8rem; border-radius: 20px;">V3 Edition</span>
        </header>
        
        <main id="main-content">
            <!-- Lesson Selection -->
            <div id="lesson-selection-screen" class="fade-in">
                <div id="restore-progress-area" class="hidden" style="text-align: center; padding-bottom: 2rem; border-bottom: 1px solid var(--border-color); margin-bottom: 2rem;"></div>
                <div id="lesson-choice-area">
                    <h2>Choose Your Next Challenge</h2>
                    <div id="lesson-cards-container"></div>
                </div>
            </div>

            <!-- Quiz Area -->
            <div id="quiz-area" class="hidden fade-in">
                <div id="test-interface" class="no-passage">
                    <!-- Passage Panel injected dynamically here if needed -->
                    <div class="panel" id="question-panel">
                        <div class="question-header">
                            <h2 id="question-title">Question</h2>
                            <div class="header-actions">
                                <button id="edit-answer-btn" class="nav-btn action-btn hidden" onclick="enableEditing()">✏️ Edit Answer</button>
                                <button id="end-exam-btn" class="nav-btn action-btn" onclick="endExamPrompt()">🛑 End Exam</button>
                            </div>
                        </div>
                        <p id="question-prompt" class="question-prompt"></p>
                        <div id="options-container" class="answer-options"></div>
                        <div id="explanation" class="hidden"></div>
                    </div>
                </div>
                 <div id="quote-area" class="hidden" style="margin-top: 3rem; padding-top: 1.5rem; border-top: 1px dashed var(--border-color); font-style: italic; color: var(--subtle-text); text-align: center;">
                    <p id="current-quote"></p>
                 </div>
            </div>

            <!-- Score Screen -->
            <div id="score-screen" class="hidden fade-in">
                 <h2>Quiz Complete!</h2>
                 <p id="score-text" style="font-size: 1.4rem; font-weight: 500; margin-bottom: 1.5rem;"></p>
                 <div id="pdf-buttons-container">
                    <button id="download-summary-pdf" class="nav-btn">📄 Download Summary</button>
                    <button id="download-mistakes-pdf" class="nav-btn action-btn">🔍 Detailed Mistake Review</button>
                    <button id="export-all-pdf-button" class="nav-btn action-btn">📚 Export All Questions</button>
                 </div>
                 <button class="nav-btn" onclick="initApp()" style="margin-top: 3rem; background: var(--text-color);">🏠 Choose Another Lesson</button>
            </div>
        </main>

        <footer id="navigation-footer" class="navigation-footer hidden">
            <button id="prev-btn" class="nav-btn action-btn" onclick="triggerPrevAnimation()">← Previous</button>
            <div id="progress-dots-container"></div>
            <div style="display: flex; gap: 0.75rem;">
                <button id="remember-btn" class="nav-btn hidden" onclick="addToRememberList()">⭐ Remember</button>
                <button id="skip-btn" class="nav-btn action-btn" onclick="skipQuestion()">⏭️ Skip</button>
                <button id="next-btn" class="nav-btn" onclick="triggerNextAnimation()">Next →</button>
            </div>
        </footer>
    </div>

    <!-- Desmos Integration -->
    <button id="desmos-fab" onclick="toggleDesmos()">📈 Scratchpad</button>
    <div id="desmos-modal" class="hidden">
        <div id="desmos-header">
            <span>Desmos Graphing Scratchpad</span>
            <button onclick="toggleDesmos()">✖</button>
        </div>
        <div id="calculator"></div>
    </div>

    <!-- Questions Data -->
    <script src="questions.js"></script>
    
    <!-- Application Logic -->
    <script>
        const quotes = [
            "The only way to do great work is to love what you do.", 
            "Education is the most powerful weapon which you can use to change the world.", 
            "The future belongs to those who believe in the beauty of their dreams.", 
            "Strive for progress, not perfection.",
            "Success is no accident. It is hard work, perseverance, learning, studying, sacrifice."
        ];
        
        let currentQuestionIndex = 0, score = 0, gameInProgress = false, isEditing = false, currentLessonId = '';
        let currentTopicQuestions = [], lessonAttempts = [], questionsToRemember = [], allUserAttempts = [];
        let desmosInitialized = false;

        const dom = { 
            lessonSelectionScreen: document.getElementById('lesson-selection-screen'), 
            lessonChoiceArea: document.getElementById('lesson-choice-area'), 
            restoreProgressArea: document.getElementById('restore-progress-area'), 
            quizArea: document.getElementById('quiz-area'), 
            questionPromptEl: document.getElementById('question-prompt'), 
            questionTitleEl: document.getElementById('question-title'), 
            optionsContainerEl: document.getElementById('options-container'), 
            explanationEl: document.getElementById('explanation'), 
            scoreScreen: document.getElementById('score-screen'), 
            scoreTextEl: document.getElementById('score-text'), 
            navigationFooter: document.getElementById('navigation-footer'), 
            progressDotsContainer: document.getElementById('progress-dots-container'), 
            prevBtn: document.getElementById('prev-btn'), 
            nextBtn: document.getElementById('next-btn'), 
            skipBtn: document.getElementById('skip-btn'), 
            rememberBtn: document.getElementById('remember-btn'), 
            editAnswerBtn: document.getElementById('edit-answer-btn'), 
            downloadSummaryPdfButton: document.getElementById('download-summary-pdf'), 
            downloadPdfButton: document.getElementById('download-mistakes-pdf'), 
            exportAllPdfButton: document.getElementById('export-all-pdf-button'), 
            quoteAreaElement: document.getElementById('quote-area'), 
            currentQuoteElement: document.getElementById('current-quote') 
        };

        // --- Core Flow & Save States ---
        function saveProgress() { if (gameInProgress) localStorage.setItem('estSparkProgress', JSON.stringify({ currentLessonId, currentQuestionIndex, score, allUserAttempts, questionsToRemember, lessonAttempts })); }
        function loadProgress() { const saved = JSON.parse(localStorage.getItem('estSparkProgress')); if (!saved) return false; ({ currentLessonId, currentQuestionIndex, score, allUserAttempts, questionsToRemember = [], lessonAttempts = [] } = saved); startGame(currentLessonId, true); return true; }
        function clearProgress() { localStorage.removeItem('estSparkProgress'); dom.restoreProgressArea.classList.add('hidden'); dom.lessonChoiceArea.classList.remove('hidden'); }
        window.addEventListener('beforeunload', (event) => { if (gameInProgress) { event.preventDefault(); event.returnValue = ''; } });
        
        function showLessonSelection() {
            gameInProgress = false; dom.quizArea.classList.add('hidden'); dom.scoreScreen.classList.add('hidden'); dom.navigationFooter.classList.add('hidden'); dom.lessonSelectionScreen.classList.remove('hidden');
            const lessonCardsContainer = document.getElementById('lesson-cards-container'); lessonCardsContainer.innerHTML = '';
            
            lessons.forEach(lesson => {
                const questionCount = allQuestions.filter(q => q.lessonId === lesson.id).length;
                if (questionCount === 0) return;
                const card = document.createElement("div"); card.className = "lesson-card";
                card.onclick = () => startGame(lesson.id);
                card.innerHTML = `
                    <div class="lesson-card-header">
                        <div class="lesson-card-icon">${lesson.icon}</div>
                        <h3 class="lesson-card-title">${lesson.title}</h3>
                    </div>
                    <p class="lesson-card-description">${lesson.description}</p>
                    <div style="margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                        <span style="font-size: 0.9rem; font-weight: 600; color: var(--subtle-text);">${questionCount} Questions</span>
                        <button class="nav-btn" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Start Now</button>
                    </div>`;
                lessonCardsContainer.appendChild(card);
            });

            if (localStorage.getItem('estSparkProgress')) {
                dom.restoreProgressArea.innerHTML = `
                    <h3 style="color: var(--primary-teal); margin-bottom: 1rem; font-size: 1.4rem;">You have saved progress!</h3>
                    <button class="nav-btn" onclick="loadProgress()">🔄 Continue Previous Session</button>
                    <button class="nav-btn action-btn" onclick="clearProgress()">🗑️ Start Fresh</button>`;
                dom.restoreProgressArea.classList.remove('hidden'); dom.lessonChoiceArea.classList.add('hidden');
            } else { dom.restoreProgressArea.classList.add('hidden'); dom.lessonChoiceArea.classList.remove('hidden'); }
        }
        
        function startGame(lessonId, isRestoring = false) {
            gameInProgress = true; currentLessonId = lessonId; currentTopicQuestions = allQuestions.filter(q => q.lessonId === lessonId);
            if (!isRestoring) { clearProgress(); currentQuestionIndex = 0; score = 0; lessonAttempts = []; questionsToRemember = []; allUserAttempts = new Array(currentTopicQuestions.length).fill(null); }
            dom.lessonSelectionScreen.classList.add('hidden'); 
            
            dom.quizArea.classList.remove('fade-in');
            void dom.quizArea.offsetWidth;
            dom.quizArea.classList.add('fade-in');
            
            dom.quizArea.classList.remove('hidden'); dom.navigationFooter.classList.remove('hidden');
            loadQuestion(currentQuestionIndex);
        }
        
        function loadQuestion(index) {
            resetState();
            const question = currentTopicQuestions[index];
            const attempt = allUserAttempts[index];
            const testInterface = document.getElementById('test-interface');
            let passagePanel = document.getElementById('passage-panel');
            
            // Dynamic Passage Panel Integration (V3 Feature)
            if (!passagePanel) {
                passagePanel = document.createElement('div');
                passagePanel.id = 'passage-panel';
                passagePanel.className = 'passage-panel panel';
                passagePanel.innerHTML = `<h3>📄 Reading Context</h3><div id="passage-content" class="passage-content"></div>`;
                testInterface.insertBefore(passagePanel, testInterface.firstChild);
            }

            if (question.passage && question.passage.trim() !== "") {
                testInterface.classList.remove('no-passage');
                testInterface.classList.add('has-passage');
                passagePanel.classList.remove('hidden');
                document.getElementById('passage-content').innerHTML = question.passage;
            } else {
                testInterface.classList.remove('has-passage');
                testInterface.classList.add('no-passage');
                passagePanel.classList.add('hidden');
            }

            dom.questionTitleEl.textContent = `Question ${question.originalNumber} of ${currentTopicQuestions.length}`; 
            dom.questionPromptEl.innerHTML = question.prompt;
            displayRandomQuote(); 
            renderProgressBar(); 
            dom.optionsContainerEl.innerHTML = '';
            
            if (question.type === 'mcq') { 
                const prefixes = ['A)', 'B)', 'C)', 'D)']; 
                question.options.forEach((option, idx) => { 
                    const button = document.createElement('button'); 
                    button.innerHTML = `<span class="answer-prefix">${prefixes[idx] || '•'}</span> ${option}`; 
                    button.classList.add('answer-btn'); 
                    button.onclick = () => selectAnswer(idx); 
                    dom.optionsContainerEl.appendChild(button); 
                }); 

                if (attempt) {
                    const answerButtons = dom.optionsContainerEl.querySelectorAll('.answer-btn');
                    answerButtons.forEach(button => button.disabled = true);
                    
                    answerButtons[question.correctAnswer].classList.add('correct');
                    if (!attempt.isCorrect) { 
                        const selectedIndex = question.options.indexOf(attempt.userChoice); 
                        if (selectedIndex > -1) answerButtons[selectedIndex].classList.add('incorrect'); 
                    }
                    
                    showExplanation(question);
                    if (!attempt.isCorrect) { 
                        dom.editAnswerBtn.classList.remove('hidden');
                        dom.editAnswerBtn.innerHTML = (attempt.userChoice === '[Skipped]') ? '✍️ Answer Question' : '✏️ Edit Answer';
                    }
                    if (attempt.isCorrect && !attempt.edited) { dom.rememberBtn.classList.remove('hidden'); checkRememberButtonState(); }
                } else { dom.skipBtn.classList.remove('hidden'); }
            
            } else if (question.type === 'grid-in' || question.type === 'essay') {
                if (!attempt || isEditing) {
                    const revealBtn = document.createElement('button');
                    revealBtn.className = 'nav-btn reveal-btn';
                    revealBtn.innerHTML = '👁️ Reveal Answer & Explanation';
                    revealBtn.onclick = () => showSelfGradeUI(question);
                    dom.optionsContainerEl.appendChild(revealBtn);
                    dom.skipBtn.classList.remove('hidden');
                } else {
                    showSelfGradeUI(question, attempt);
                }
            }

            updateNavButtons();
        }

        // --- Grid-In (Self Grading) UI Logic ---
        function showSelfGradeUI(question, attempt = null) {
            dom.optionsContainerEl.innerHTML = '';
            showExplanation(question, true);
            dom.skipBtn.classList.add('hidden');
            
            if (attempt && !isEditing) {
                const resultDiv = document.createElement('div');
                resultDiv.className = `self-grade-result ${attempt.isCorrect ? 'correct' : 'incorrect'}`;
                resultDiv.innerHTML = `You marked this as: <strong>${attempt.isCorrect ? 'Correct ✅' : 'Incorrect ❌'}</strong>`;
                dom.optionsContainerEl.appendChild(resultDiv);
                
                dom.editAnswerBtn.classList.remove('hidden');
                dom.editAnswerBtn.innerHTML = '✏️ Change Grade';
                if (attempt.isCorrect && !attempt.edited) { dom.rememberBtn.classList.remove('hidden'); checkRememberButtonState(); }
                
                dom.nextBtn.disabled = false;
            } else {
                const gradePrompt = document.createElement('h3');
                gradePrompt.textContent = "Be honest, did you figure out the blank / answer correctly?";
                gradePrompt.style.marginTop = "1.5rem";
                gradePrompt.style.color = "var(--text-color)";
                
                const btnGroup = document.createElement('div');
                btnGroup.style.display = "flex"; btnGroup.style.gap = "1rem"; btnGroup.style.marginTop = "1rem";
                
                const btnRight = document.createElement('button');
                btnRight.className = 'nav-btn answer-btn correct';
                btnRight.style.justifyContent = "center"; btnRight.innerHTML = '✅ Yes, got it right!';
                btnRight.onclick = () => submitSelfGrade(true);
                
                const btnWrong = document.createElement('button');
                btnWrong.className = 'nav-btn answer-btn incorrect';
                btnWrong.style.justifyContent = "center"; btnWrong.innerHTML = '❌ No, I missed it';
                btnWrong.onclick = () => submitSelfGrade(false);
                
                btnGroup.appendChild(btnRight);
                btnGroup.appendChild(btnWrong);
                
                dom.optionsContainerEl.appendChild(gradePrompt);
                dom.optionsContainerEl.appendChild(btnGroup);
                
                dom.nextBtn.disabled = true;
            }
        }

        function submitSelfGrade(isCorrect) {
            const question = currentTopicQuestions[currentQuestionIndex];
            let attempt = allUserAttempts[currentQuestionIndex];
            const choiceLabel = isCorrect ? '[Self-Marked Correct]' : '[Self-Marked Incorrect]';
            
            if (!attempt) {
                if (isCorrect) score++;
                attempt = { isCorrect, userChoice: choiceLabel, edited: false, originalUserChoice: choiceLabel };
                allUserAttempts[currentQuestionIndex] = attempt;
            } else {
                const wasCorrect = attempt.isCorrect;
                if (wasCorrect && !isCorrect) score--;
                if (!wasCorrect && isCorrect) score++;
                attempt.isCorrect = isCorrect;
                attempt.userChoice = choiceLabel;
                attempt.edited = true;
            }
            
            const mistakeIndex = lessonAttempts.findIndex(q => q.originalNumber === question.originalNumber);
            if (isCorrect && mistakeIndex > -1) lessonAttempts.splice(mistakeIndex, 1);
            if (!isCorrect && mistakeIndex === -1) lessonAttempts.push({ ...question, selectedAnswer: attempt.userChoice });
            if (!isCorrect && mistakeIndex > -1) lessonAttempts[mistakeIndex].selectedAnswer = attempt.userChoice;
            
            isEditing = false;
            loadQuestion(currentQuestionIndex);
            saveProgress();
        }

        // --- Helper functions ---
        function showExplanation(question, isGridIn = false) {
            let answerTextHtml = isGridIn ? `<h4>✅ Correct Answer: <span class="highlight-answer">${question.correctAnswerText}</span></h4><hr style="margin:1rem 0; border:0; border-top:1px solid var(--border-color);">` : '';
            dom.explanationEl.innerHTML = `${answerTextHtml}<h4>💡 Explanation / Note</h4><p>${question.explanation}</p>`; 
            dom.explanationEl.classList.remove('hidden');
        }

        function resetState() { 
            dom.explanationEl.classList.add('hidden'); dom.skipBtn.classList.add('hidden'); 
            dom.rememberBtn.classList.add('hidden'); dom.editAnswerBtn.classList.add('hidden'); 
            isEditing = false; 
        }
        
        function selectAnswer(selectedIndex) {
            const question = currentTopicQuestions[currentQuestionIndex];
            let attempt = allUserAttempts[currentQuestionIndex];
            const isFirstAnswer = !attempt;
            const isCorrect = selectedIndex === question.correctAnswer;
            const userChoiceText = question.options[selectedIndex];
            
            if (isFirstAnswer) {
                if (isCorrect) score++;
                attempt = { isCorrect, userChoice: userChoiceText, edited: false, originalUserChoice: userChoiceText };
                allUserAttempts[currentQuestionIndex] = attempt;
            } else {
                const wasCorrect = attempt.isCorrect;
                if (wasCorrect && !isCorrect) score--; 
                if (!wasCorrect && isCorrect) score++;
                attempt.isCorrect = isCorrect; 
                attempt.userChoice = userChoiceText; 
                attempt.edited = true;
            }
            
            const mistakeIndex = lessonAttempts.findIndex(q => q.originalNumber === question.originalNumber);
            if (isCorrect && mistakeIndex > -1) lessonAttempts.splice(mistakeIndex, 1);
            if (!isCorrect && mistakeIndex === -1) lessonAttempts.push({ ...question, selectedAnswer: userChoiceText });
            if (!isCorrect && mistakeIndex > -1) lessonAttempts[mistakeIndex].selectedAnswer = userChoiceText;
            
            isEditing = false;
            loadQuestion(currentQuestionIndex);
            saveProgress();
        }
        
        function enableEditing() { 
            isEditing = true; 
            const q = currentTopicQuestions[currentQuestionIndex];
            if (q.type === 'mcq') {
                const answerButtons = dom.optionsContainerEl.querySelectorAll('.answer-btn'); 
                answerButtons.forEach(button => { button.disabled = false; button.classList.remove('correct', 'incorrect'); }); 
                dom.explanationEl.classList.add('hidden'); dom.editAnswerBtn.classList.add('hidden'); dom.rememberBtn.classList.add('hidden'); 
                updateNavButtons(); 
            } else {
                loadQuestion(currentQuestionIndex); 
            }
        }
        
        function skipQuestion() { 
            if (allUserAttempts[currentQuestionIndex]) return; 
            const q = currentTopicQuestions[currentQuestionIndex]; 
            allUserAttempts[currentQuestionIndex] = { isCorrect: false, userChoice: "[Skipped]", edited: false, originalUserChoice: "[Skipped]" }; 
            lessonAttempts.push({ ...q, selectedAnswer: "[Skipped]" }); 
            loadQuestion(currentQuestionIndex); 
            saveProgress(); 
        }
        
        function endExamPrompt() { if(confirm("Are you sure you want to end the exam? All unanswered questions will be marked as skipped.")){ forceEndExam(); } }
        function forceEndExam() { 
            allUserAttempts.forEach((attempt, index) => { 
                if (!attempt) { 
                    const q = currentTopicQuestions[index]; 
                    allUserAttempts[index] = { isCorrect: false, userChoice: "[Skipped]", edited: false, originalUserChoice: "[Skipped]" }; 
                    lessonAttempts.push({ ...q, selectedAnswer: "[Skipped]" }); 
                } 
            }); 
            endGame(); 
        }
        
        function updateNavButtons() { 
            dom.prevBtn.disabled = currentQuestionIndex === 0; 
            dom.nextBtn.disabled = allUserAttempts[currentQuestionIndex] === null || isEditing; 
            dom.nextBtn.innerHTML = (currentQuestionIndex === currentTopicQuestions.length - 1) ? 'Finish Flag 🏁' : 'Next →'; 
        }
        
        function renderProgressBar() {
            dom.progressDotsContainer.innerHTML = '';
            for (let i = 0; i < currentTopicQuestions.length; i++) {
                const dot = document.createElement('div'); dot.classList.add('progress-dot');
                if (i === currentQuestionIndex) dot.classList.add('current');
                
                dot.onclick = () => jumpToQuestion(i);
                
                const attempt = allUserAttempts[i];
                if (attempt) { 
                    dot.classList.add('answered'); 
                    if (attempt.edited) dot.classList.add('edited'); 
                    else dot.classList.add(attempt.isCorrect ? 'correct' : 'incorrect'); 
                }
                dom.progressDotsContainer.appendChild(dot);
            }
        }
        
        function jumpToQuestion(index) { if (index === currentQuestionIndex || isEditing) return; currentQuestionIndex = index; dom.quizArea.classList.remove('fade-in'); void dom.quizArea.offsetWidth; dom.quizArea.classList.add('fade-in'); loadQuestion(index); }
        function triggerAnimation(direction) { if ((direction === 1 && currentQuestionIndex >= currentTopicQuestions.length - 1) || (direction === -1 && currentQuestionIndex <= 0)) { if (direction === 1) endGame(); return; } const newIndex = currentQuestionIndex + direction; jumpToQuestion(newIndex); }
        const triggerNextAnimation = () => triggerAnimation(1), triggerPrevAnimation = () => triggerAnimation(-1);
        
        function endGame() { 
            gameInProgress = false; clearProgress(); 
            dom.quizArea.classList.add('hidden'); dom.navigationFooter.classList.add('hidden'); 
            
            dom.scoreScreen.classList.remove('fade-in'); void dom.scoreScreen.offsetWidth; dom.scoreScreen.classList.add('fade-in');
            dom.scoreScreen.classList.remove('hidden'); 
            
            const pct = Math.round((score / currentTopicQuestions.length) * 100);
            let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🔥' : '💪';
            dom.scoreTextEl.innerHTML = `${emoji} You scored <strong>${score} out of ${currentTopicQuestions.length}</strong> (${pct}%)`; 
            
            const hasReview = lessonAttempts.length > 0 || questionsToRemember.length > 0 || allUserAttempts.some(a => a?.edited); 
            dom.downloadPdfButton.classList.toggle('hidden', !hasReview); 
            dom.exportAllPdfButton.classList.toggle('hidden', currentTopicQuestions.length === 0); 
            dom.downloadSummaryPdfButton.classList.toggle('hidden', currentTopicQuestions.length === 0); 
        }
        
        function displayRandomQuote() { dom.currentQuoteElement.textContent = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`; dom.quoteAreaElement.classList.remove('hidden'); }
        function initApp() { showLessonSelection(); }
        function addToRememberList() { const q = currentTopicQuestions[currentQuestionIndex]; const index = questionsToRemember.findIndex(item => item.originalNumber === q.originalNumber); if (index > -1) questionsToRemember.splice(index, 1); else questionsToRemember.push(q); checkRememberButtonState(); saveProgress(); }
        function checkRememberButtonState() { const q = currentTopicQuestions[currentQuestionIndex]; const isRemembered = questionsToRemember.some(item => item.originalNumber === q.originalNumber); dom.rememberBtn.innerHTML = isRemembered ? '⭐ Remembered' : '⭐ Remember'; dom.rememberBtn.style.backgroundColor = isRemembered ? 'var(--remember-yellow-dark)' : 'var(--remember-yellow)'; }

        // --- Desmos Integration ---
        function toggleDesmos() {
            const modal = document.getElementById('desmos-modal');
            const isHidden = modal.classList.contains('hidden');
            
            if (isHidden) {
                modal.classList.remove('hidden');
                if (!desmosInitialized) {
                    try {
                        if (typeof Desmos !== 'undefined') {
                            const elt = document.getElementById('calculator');
                            const calculator = Desmos.GraphingCalculator(elt, { expressions: true, settingsMenu: true });
                            desmosInitialized = true;
                        } else {
                            document.getElementById('calculator').innerHTML = `<div style="padding: 2rem; text-align: center; color: var(--subtle-text);">Desmos requires an active internet connection to load. Connect to Wi-Fi to use the scratchpad!</div>`;
                        }
                    } catch (e) {
                         document.getElementById('calculator').innerHTML = `<div style="padding: 2rem; text-align: center; color: red;">Failed to load graphing calculator.</div>`;
                    }
                }
            } else {
                modal.classList.add('hidden');
            }
        }

        // --- PDF Generation Logic ---
        const pdfStyles = `<style>body{font-family:'Arial',sans-serif;line-height:1.5;color:#333}.item-container{border:1px solid #e2e8f0;padding:20px;margin-bottom:25px;border-radius:8px;page-break-inside:avoid; background: #fff;}.question-prompt{font-size:14pt;margin-bottom:12px; font-weight: bold;}h1,h2,h3{color:#0f172a}.correct-answer{color:#15803d; font-weight: bold;} .incorrect-answer{background-color: #fef2f2; color: #b91c1c;} .original-answer{color:#b91c1c; text-decoration: line-through;} .explanation-text{font-size:11pt;color:#1e293b;margin-top:12px; padding: 10px; background: #f8fafc; border-left: 4px solid #3b82f6;}ul{list-style:none;padding-left:0}li{margin-bottom:6px} .summary-list p{font-size:12pt;font-family:monospace;margin-bottom:8px; border-bottom: 1px solid #eee; padding-bottom: 4px;}.summary-correct{color:#15803d;font-weight:bold;}.summary-incorrect{color:#b91c1c;font-weight:bold;}.summary-q-num{font-weight:bold;} .edited-tag, .remember-mark{font-size:10pt;font-style:italic;color:#64748b;margin-left:8px;font-weight:normal;} .grid-in-badge{display:inline-block; padding:3px 8px; border:1px solid #cbd5e1; border-radius:4px; font-size:10pt; color:#475569; margin-left:10px;}</style>`;
        
        function buildItemHtml(item, attempt) { 
            const isRemembered = questionsToRemember.some(q => q.originalNumber === item.originalNumber); 
            const isGridIn = item.type !== 'mcq';
            
            let itemHtml = `<div class="item-container"><h4>Question ${item.originalNumber}${isGridIn ? '<span class="grid-in-badge">Grid-in / Essay</span>' : ''}${attempt?.edited ? '<span class="edited-tag">(Edited)</span>' : ''}${isRemembered ? '<span class="remember-mark">★ Remembered</span>' : ''}</h4>`; 
            if (item.passage) itemHtml += `<div style="font-size: 10pt; color: #666; margin-bottom: 10px; padding: 10px; background: #f0f0f0;">${item.passage}</div>`;
            if (item.prompt) itemHtml += `<p class="question-prompt">${item.prompt}</p>`; 
            
            if (!isGridIn && attempt) { 
                itemHtml += '<ul>'; 
                const prefixes = ['A)', 'B)', 'C)', 'D)']; 
                item.options.forEach((opt, i) => { 
                    let styleClass = ''; 
                    if (i === item.correctAnswer) styleClass = 'correct-answer'; 
                    else if (attempt.edited && opt === attempt.originalUserChoice && opt !== '[Skipped]') styleClass = 'original-answer'; 
                    else if (!attempt.isCorrect && opt === attempt.userChoice) styleClass = 'incorrect-answer'; 
                    itemHtml += `<li class="${styleClass}">${prefixes[i]} ${opt}</li>`; 
                }); 
                itemHtml += '</ul>'; 
            } 
            
            if (attempt?.userChoice === '[Skipped]') {
                itemHtml += `<p><em>You skipped this question.</em></p>`; 
            } else if (attempt?.userChoice) {
                if (attempt.edited && attempt.originalUserChoice === '[Skipped]') {
                    itemHtml += `<p><em>You originally skipped this question, but later answered it.</em></p>`;
                }
                if(isGridIn) {
                     itemHtml += `<p><strong>Self-Graded As:</strong> <span class="${attempt.isCorrect ? 'correct-answer' : 'incorrect-answer'}">${attempt.isCorrect ? 'Correct' : 'Incorrect'}</span></p>`; 
                } else {
                     itemHtml += `<p><strong>Your Final Answer:</strong> ${attempt.userChoice}</p>`; 
                }
            } 
            
            itemHtml += `<p class="correct-answer">Correct Answer: ${item.correctAnswerText}</p><div class="explanation-text"><strong>Explanation:</strong><br>${item.explanation}</div></div>`; 
            return itemHtml; 
        }
        
        function generateReviewPDF() { 
            const lessonTitle = lessons.find(l => l.id === currentLessonId)?.title || "Review"; 
            let pdfHtml = `<html><head><title>${lessonTitle} Detailed Review</title>${pdfStyles}</head><body><h1>Detailed Review PDF</h1><h2>${lessonTitle}</h2>`; 
            const addSection = (title, items) => { 
                if (items.length > 0) { 
                    pdfHtml += `<h3>${title}</h3>`; 
                    items.forEach(item => { 
                        const qIndex = currentTopicQuestions.findIndex(q => q.originalNumber === item.originalNumber); 
                        pdfHtml += buildItemHtml(item, allUserAttempts[qIndex]); 
                    }); 
                } 
            }; 
            
            const mistakes = lessonAttempts.filter(item => !allUserAttempts[currentTopicQuestions.findIndex(q => q.originalNumber === item.originalNumber)]?.edited); 
            const remembered = questionsToRemember.filter(item => !mistakes.some(m => m.originalNumber === item.originalNumber)); 
            const edited = allUserAttempts.map((a, i) => ({...a, originalNumber: currentTopicQuestions[i].originalNumber})).filter(a => a?.edited); 
            
            addSection('Mistakes & Skips', mistakes); 
            addSection('Items to Remember', remembered); 
            addSection('Edited Questions', edited.map(e => ({...currentTopicQuestions.find(q=>q.originalNumber === e.originalNumber)}))); 
            
            pdfHtml += '</body></html>'; 
            html2pdf().from(pdfHtml).set({ margin: 15, filename: `${lessonTitle.replace(/ /g,"_")}_Detailed_Review.pdf`, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).save(); 
        }
        
        function generateAllQuestionsPDF() { 
            const lessonTitle = lessons.find(l => l.id === currentLessonId)?.title || "Review"; 
            let pdfHtml = `<html><head><title>${lessonTitle} All Questions</title>${pdfStyles}</head><body><h1>All Questions & Answers</h1><h2>${lessonTitle}</h2>`; 
            currentTopicQuestions.forEach((item, index) => { pdfHtml += buildItemHtml(item, allUserAttempts[index]); }); 
            pdfHtml += '</body></html>'; 
            html2pdf().from(pdfHtml).set({ margin: 15, filename: `${lessonTitle.replace(/ /g,"_")}_All_Questions.pdf`, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).save(); 
        }
        
        function generateSummaryPDF() {
            const lessonTitle = lessons.find(l => l.id === currentLessonId)?.title || "Summary"; let listHtml = '';
            const getLetter = (choice, question) => {
                if(choice === '[Skipped]') return 'Skip';
                if(question.type !== 'mcq') return choice.includes('Correct') ? '✅' : '❌';
                return String.fromCharCode(65 + question.options.indexOf(choice));
            };

            currentTopicQuestions.forEach((question, index) => {
                const attempt = allUserAttempts[index]; if (!attempt) return;
                const qNum = question.originalNumber.toString().padStart(2, '0'); 
                const correctLetter = question.type === 'mcq' ? getLetter(question.options[question.correctAnswer], question) : '✅';
                const isRemembered = questionsToRemember.some(q => q.originalNumber === question.originalNumber); 
                const rememberMark = isRemembered ? ' <span style="color:#f59e0b;">★</span>' : '';
                
                if (question.type !== 'mcq') {
                    if (attempt.edited) {
                        const origIcon = attempt.originalUserChoice.includes('Correct') ? '✅' : '❌';
                        const newIcon = attempt.isCorrect ? '✅' : '❌';
                        listHtml += `<p><span class="summary-q-num">Q${qNum}</span> | <s>${origIcon}</s> → ${newIcon} ${rememberMark}</p>`;
                    } else {
                        const icon = attempt.isCorrect ? '<span style="color:#15803d;">✅ Self-Graded Correct</span>' : '<span style="color:#b91c1c;">❌ Self-Graded Incorrect</span>';
                        listHtml += `<p><span class="summary-q-num">Q${qNum}</span> | ${icon} ${rememberMark}</p>`;
                    }
                } else {
                    if (attempt.edited) {
                        const originalChoiceLetter = getLetter(attempt.originalUserChoice, question); 
                        const currentChoiceLetter = getLetter(attempt.userChoice, question);
                        const finalChoiceHtml = attempt.isCorrect ? `<span class="summary-correct">${currentChoiceLetter}</span>` : `<span class="summary-incorrect">${currentChoiceLetter}</span>`;
                        const explanation = attempt.isCorrect ? '' : ` (Answer: ${correctLetter})`;
                        listHtml += `<p><span class="summary-q-num">Q${qNum}</span> | <span class="summary-incorrect"><s>${originalChoiceLetter}</s></span> → ${finalChoiceHtml}${explanation}${rememberMark}</p>`;
                    } else {
                        if (attempt.isCorrect) listHtml += `<p><span class="summary-q-num">Q${qNum}</span> | <span class="summary-correct">${getLetter(attempt.userChoice, question)}</span>${rememberMark}</p>`;
                        else listHtml += `<p><span class="summary-q-num">Q${qNum}</span> | <span class="summary-incorrect"><s>${getLetter(attempt.userChoice, question)}</s></span> (Answer: <span class="summary-correct">${correctLetter}</span>)${rememberMark}</p>`;
                    }
                }
            });
            let pdfHtml = `<html><head><title>${lessonTitle} Summary</title>${pdfStyles}</head><body><h1>Summarized Score Report</h1><h2>${lessonTitle}</h2><h3 style="padding:10px; background:#e0f2fe; display:inline-block; border-radius:8px;">Final Score: ${score} / ${currentTopicQuestions.length}</h3><div class="summary-list" style="margin-top:20px;">${listHtml}</div></body></html>`;
            html2pdf().from(pdfHtml).set({ margin: 15, filename: `${lessonTitle.replace(/ /g,"_")}_Summary.pdf`, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).save();
        }
        
        dom.downloadSummaryPdfButton.addEventListener('click', generateSummaryPDF);
        dom.downloadPdfButton.addEventListener('click', generateReviewPDF);
        dom.exportAllPdfButton.addEventListener('click', generateAllQuestionsPDF);
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
